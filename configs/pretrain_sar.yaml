# SAR backbone pre-training — SARDet-100K üzerinde tek modal eğitim

defaults:
  - base.yaml

data:
  train_dataset: sardet
  val_dataset: sardet
  data_root: ./data/sardet_100k

model:
  num_classes: 6  # SARDet-100K sınıflama

training:
  epochs: 50
  batch_size: 32

loss:
  camouflage_aware:
    enabled: false  # Pre-training'de gerek yok
